model_name: "meta-llama/Meta-Llama-3-8B-Instruct"
preference_pairs_file: "./data/preference_pairs.jsonl"
output_dir: "./ckpts/ppo_llama3_8b_instruct_ep5"
num_iterations: 10
epochs_per_iteration: 3
rollout_batch_size: 8
max_new_tokens: 256
max_rollout_prompts: 512
batch_size: 16
max_physical_batch_size: 2
clip_epsilon: 0.2
beta_kl: 0.1
device: "cuda:0"

actor:
  device: "cuda:0"
  lr: 5e-6
  lora:
    r: 8
    alpha: 32
    dropout: 0.1

critic:
  device: "cuda:1"
  lr: 5e-6
  lora:
    r: 8
    alpha: 32
    dropout: 0.1

ref:
  device: "cuda:2"

rm:
  model_path: "./ckpts/rm_llama3_8b_instruct_ep5/epoch_3"
  device: "cuda:2"

enable_dp: true
dp:
  actor:
    target_epsilon: 5.0
    target_delta: 1e-5
    max_grad_norm: 1.0
  critic:
    target_epsilon: 5.0
    target_delta: 1e-5
    max_grad_norm: 1.0

wandb:
  project: "privmedchat"
  group: "ppo"
  name: "ppo_llama3_8b_instruct_ep5"
  entity: "privmedchat"