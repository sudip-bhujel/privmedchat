model_name: "meta-llama/Meta-Llama-3-8B-Instruct"
train_file: "./data/meddialog_train.jsonl"
eval_file: "./data/meddialog_val.jsonl"
input_format: "auto"
label_mode: "doctor_only"
pair_sft_source: "chosen"
eval_split_ratio: 0.05
eval_split_seed: 42
output_dir: "./ckpts/sft_llama3_8b_instruct_dp_ep1"
num_epochs: 3
batch_size: 16
max_physical_batch_size: 4
max_seq_length: 1024
lr: 2e-5
weight_decay: 0.01
lora:
  r: 16
  alpha: 32
  dropout: 0.1
enable_dp: true
target_epsilon: 1.0
target_delta: 1e-5
max_grad_norm: 1.0
device: "cuda"
wandb:
  project: "sft_training"
  name: "sft_llama3_8b_instruct_dp_ep1"
  entity: "privmedchat"